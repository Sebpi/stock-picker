app = "stock-picker-sp"
primary_region = "ams"

[build]

[env]
  ALLOWED_HOSTS = "stock-picker-sp.fly.dev,localhost,127.0.0.1"
  ALLOWED_ORIGINS = "https://stock-picker-sp.fly.dev"
  APP_URL = "https://stock-picker-sp.fly.dev"
  DATA_DIR = "/app/data"
  FRONTEND_DIR = "/app/frontend"
  REQUIRE_HTTPS = "true"
  THESIS_AUTO_RUN_ENABLED = "true"
  THESIS_AUTO_RUN_INTERVAL_MINUTES = "1440"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "stock_picker_data"
  destination = "/app/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
