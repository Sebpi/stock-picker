name: Promote user to admin

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username to promote to admin role"
        required: true
        type: string

jobs:
  promote:
    name: Set role=admin in prod DB
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Promote user
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          TARGET_USERNAME: ${{ github.event.inputs.username }}
        run: |
          flyctl ssh console -a stock-picker-sp --command \
            "TUSER='${TARGET_USERNAME}' python3 -c 'import sqlite3,os; u=os.environ[\"TUSER\"].lower(); conn=sqlite3.connect(\"/app/data/stockpicker.db\"); conn.execute(\"UPDATE app_users SET role=? WHERE username=lower(?)\", (\"admin\",u)); conn.commit(); row=conn.execute(\"SELECT username,role,tier FROM app_users WHERE username=lower(?)\", (u,)).fetchone(); print(\"Result:\",row or \"not found\"); conn.close()'"
