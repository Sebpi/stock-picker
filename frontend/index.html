<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>StockLens v2 - Mobile First</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Play CDN reads tailwind.config from this script tag AFTER it has loaded.
    // Setting the config before the CDN script blanks it out, so bg-pulse-*,
    // border-pulse-*, and from-pulse-cyan utilities never get generated and
    // inputs render with a default white background.
    tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
              mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
            },
            colors: {
              pulse: {
                bg: "#06070a",
                panel: "#0c0e14",
                card: "#12151d",
                line: "#242a3a",
                ink: "#e8ecf5",
                muted: "#a8b0c2",
                dim: "#5e6678",
                cyan: "#00e5d9",
                magenta: "#ff4dca",
                lime: "#c4ff3d",
                amber: "#ffc857",
                red: "#ff4d6e",
                green: "#3fde7e",
              }
            },
            boxShadow: {
              glow: "0 0 28px rgba(0,229,217,.14)",
              magenta: "0 0 28px rgba(255,77,202,.12)",
            }
          }
        }
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    html, body, #root { min-height: 100%; background: #06070a; }
    body {
      margin: 0;
      color: #e8ecf5;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      background:
        radial-gradient(900px 500px at 0% -10%, rgba(0,229,217,.12), transparent 60%),
        radial-gradient(720px 460px at 100% 8%, rgba(255,77,202,.10), transparent 62%),
        #06070a;
    }
    input, select, textarea { font-size: 16px; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/static/react-app.js?v=2"></script>
</body>
</html>
